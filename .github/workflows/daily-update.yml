name: Daily Data Update & Deploy

on:
  schedule:
    # 每天北京时间 21:00 (UTC 13:00)
    - cron: '0 13 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push gh-pages branch
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml akshare pandas

      - name: Fetch all financial data
        run: python fetch_all_data.py

      - name: Commit data.json to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📊 Update financial dashboard data [skip ci]"
          file_pattern: 'docs/data.json'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: Deploy docs/ to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "🚀 Deploy dashboard [skip ci]"

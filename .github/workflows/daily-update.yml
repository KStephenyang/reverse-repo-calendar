name: Daily Data Update & Deploy

on:
  schedule:
    # 每天北京时间 21:00 (UTC 13:00)
    - cron: '0 13 * * *'
  # 允许手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml akshare pandas

      - name: Fetch all financial data
        run: python fetch_all_data.py

      - name: Commit data.json to main
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📊 Update financial dashboard data [skip ci]"
          file_pattern: 'docs/data.json'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: Deploy docs/ to gh-pages branch
        run: |
          # Copy docs/ content to gh-pages branch
          git fetch origin gh-pages || true
          # Save docs directory
          cp -r docs /tmp/docs_deploy
          # Switch to gh-pages branch (create if needed)
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          # Clean everything
          git rm -rf . 2>/dev/null || true
          # Copy docs content
          cp -r /tmp/docs_deploy/* .
          # Add .nojekyll to prevent Jekyll processing
          touch .nojekyll
          # Commit and push
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --staged --quiet || git commit -m "🚀 Deploy dashboard [skip ci]"
          git push origin gh-pages --force
